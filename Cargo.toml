[package]
name = "stremio-linux-shell"
version = "1.0.0-beta.13"
description = "Freedom to Stream"
authors = ["Stremio"]
homepage = "https://stremio.com"
repository = "https://github.com/Stremio/stremio-linux-shell"
license = "GPL-3.0-only"
edition = "2024"

[features]
offline-build = []

[dependencies]
gtk = { package = "gtk4", version = "0.10.3", features = ["v4_20"] }
adw = { package = "libadwaita", version = "0.8.1", features = ["v1_8"] }
cef = { version = "145.0.0+145.0.22", git = "https://github.com/Stremio/cef-rs" }
tokio = { version = "1.49.0", features = ["full"] }
ashpd = { version = "0.12.2", features = ["gtk4"] }
ksni = "0.3.3"
libloading = "0.9.0"
epoxy = "0.1.0"
libc = "0.2.182"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
serde = "1.0.228"
serde_json = "1.0.149"
itertools = "0.14.0"
rand = "0.9.2"
libmpv2 = "5.0.3"
clap = { version = "4.5.58", features = ["derive"] }
image = "0.25.9"
chrono = "0.4.43"
reqwest = { version = "0.13.2", features = ["json"] }
anyhow = "1.0.101"
url = "2.5.8"
dirs = "6.0.0"
gettext-rs = { version = "0.7.7", features = ["gettext-system"] }
flume = "0.12.0"
crossbeam-queue = "0.3.12"

[build-dependencies]
anyhow = "1.0.101"
serde = "1.0.228"
serde_json = "1.0.149"
toml = "0.9.8"
ureq = { version = "3.2.0", features = ["json"] }
bzip2 = "0.6.1"
tar = "0.4.44"
globset = "0.4.18"
